events {}

http {
    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Gateway por PATH (ADR-0006). A API legada vive sob /api.
        # proxy_pass com barra final remove o prefixo /api antes de repassar.
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
        }

        location = /health {
            proxy_pass http://backend/health;
        }

        # Reservado para os proximos increments (ADR-0006):
        # location /mcp/     { ... }  # MCP server (HTTP/SSE)
        # location /storage/ { ... }  # MinIO
        # location /         { ... }  # frontend (console operador)
    }
}
