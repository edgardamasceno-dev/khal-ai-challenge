events {}

http {
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream mcp {
        server mcp-server:8000;
    }

    server {
        listen 80;
        server_name _;

        # Gateway por PATH (ADR-0006). A API legada vive sob /api.
        # proxy_pass com barra final remove o prefixo /api antes de repassar.
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
        }

        location = /health {
            proxy_pass http://backend/health;
        }

        # MCP server (streamable-HTTP/SSE) consumido pelo agente. Buffering off.
        location /mcp {
            proxy_pass http://mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # Console do operador (SPA React/Vite). Demais paths caem aqui.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Reservado para os proximos increments (ADR-0006):
        # location /storage/ { ... }  # MinIO
    }
}
