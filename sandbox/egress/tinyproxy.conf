User nobody
Group nobody
Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Info
MaxClients 50

# Quais CLIENTES podem usar o proxy (o sandbox, na egressnet interna).
Allow 0.0.0.0/0

# Allowlist de DESTINOS: nega tudo, exceto o que casa no filtro.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off

# CONNECT (HTTPS) so para 443.
ConnectPort 443
