# Override do compose REAL (implementation/docker-compose.yml). Adiciona o
# sandbox + o egress-proxy + as redes internas, sem duplicar backend/mcp.
#
#   docker compose -f docker-compose.yml -f sandbox/compose.sandbox.yml \
#     up -d --build mcp-server egress-proxy sandbox
#
# Isolamento:
#   - mcpnet (interna): sandbox <-> mcp-server (so o negocio via MCP).
#   - egressnet (interna): sandbox <-> egress-proxy (sem internet direta).
#   - o egress-proxy e a UNICA rota p/ internet, com allowlist (Anthropic + WhatsApp).

networks:
  mcpnet:
    internal: true
  egressnet:
    internal: true
  # SPEC-030: ponte backend/worker <-> Omni API do sandbox (resolução LID→telefone do
  # find_customer + envio proativo SPEC-009). External: criada por `make sandbox-wanet`
  # (ou `docker network create khal-wanet`). NÃO é interna — também dá ao sandbox a rota
  # direta do WSS do Baileys (§6.0). O AGENTE segue isolado por TOOL-SCOPING (só MCP +
  # Bash(omni:*)); esta rede é a SAÍDA do negócio para o Omni, não um caminho do agente.
  khal-wanet:
    external: true

services:
  mcp-server:
    networks:
      - default   # appnet: alcanca o backend
      - mcpnet    # ponte p/ o sandbox

  egress-proxy:
    # Imagem pre-buildada: docker build -t khal-egress-proxy sandbox/egress
    image: khal-egress-proxy
    container_name: khal-egress-proxy
    restart: unless-stopped
    networks:
      - egressnet   # interna: o sandbox fala com o proxy aqui
      - default     # tem internet (saida allowlisted)

  sandbox:
    image: khal-sandbox:base
    container_name: khal-sandbox
    command: ["sleep", "infinity"]
    restart: unless-stopped
    networks:
      mcpnet: {}      # so o mcp-server
      egressnet: {}   # so o proxy (sem internet direta)
      # SPEC-030: a Omni API do sandbox fica alcançável como `omni:8882` p/ o backend/worker
      # (resolução LID + proativo). Alias só de REDE; o agente não ganha rota nova (tool-scoping).
      khal-wanet:
        aliases: [omni]
    environment:
      HTTP_PROXY: http://egress-proxy:8888
      HTTPS_PROXY: http://egress-proxy:8888
      # CDNs de mídia (mmg/*.cdn/*.fna) ficam fora do proxy: o upload do Baileys usa
      # `fetch` com streaming, que o Bun NÃO tuneliza via CONNECT (SPEC-019/ADR-0010).
      # INÓCUO sem internet direta (Omni tenta direto, falha, o link cobre); só habilita
      # o anexo quando `sandbox/enable-media.sh` (opt-in) dá a rota NAT. Default = isolado.
      NO_PROXY: mcp-server,localhost,127.0.0.1,mmg.whatsapp.net,.cdn.whatsapp.net,.fna.whatsapp.net
      # MCP interno (mcpnet) consumido pelo agente CX via Claude Code.
      MCP_URL: http://mcp-server:8000/mcp
      # SPEC-030: key FIXA da Omni API (= OMNI_API_KEY do backend). A API usa esta env como
      # key primária (packages/api/src/services/api-keys.ts); backend e Omni passam a bater →
      # resolve_canonical (LID→telefone) autentica, SEM reseed. Vazio = Omni gera key efêmera → 401.
      OMNI_API_KEY: ${OMNI_API_KEY:-}
      # CAG (R-08): a kb/ da entrega (montada em /srv/agent-kb, volume abaixo) e
      # pre-carregada pelo genie-wire.sh no prefixo estavel do prompt — mesma ordem/
      # formato de src/agent/prompt.py, garantindo paridade eval<->producao (M-07).
      # Sem este mount o bloco CAG some e o agente cai no search_knowledge_base.
      WIRE_KB: /srv/agent-kb
      # R-05 (cold-start estrutural): pgdata do Genie num caminho dedicado, montado
      # em VOLUME NOMEADO (abaixo), p/ sobreviver a `--force-recreate`. Fica FORA de
      # ~/.genie p/ não cobrir o config.json (setupComplete) gravado no build.
      # Reversível: sem o volume + esta env, o sandbox-up.sh cai no default legado.
      GENIE_PGDATA: /home/node/.genie-pgdata
    volumes:
      # Persona da entrega (fonte única do AGENTS.md do agente CX), só leitura.
      - ./agent:/srv/agent-src:ro
      # CAG (R-08/M-07): a kb/ da entrega pré-carregada no prompt do agente (ver WIRE_KB),
      # em path dedicado (sem nested-mount sobre o agent-src ro), só leitura.
      - ./kb:/srv/agent-kb:ro
      # R-20: hooks de guardrail determinístico + settings do Claude Code (escopo
      # user), só leitura. O genie-wire.sh copia o settings.json p/ ~/.claude.
      # (paths relativos ao docker-compose.yml base, na raiz da entrega).
      - ./sandbox/agent/hooks:/srv/agent/hooks:ro
      - ./sandbox/agent/settings.json:/srv/agent/settings.json:ro
      # Login do Claude Code + config MCP (escopo user), persistido e NÃO versionado (ADR-0007).
      - claude-home:/home/node/.claude
      # R-05: pgdata do Genie persistente entre recriações do container (cold-start
      # pago uma vez por chat na vida, casado com o --resume do Genie).
      - genie-pgdata:/home/node/.genie-pgdata
    depends_on:
      - egress-proxy

  # SPEC-030: backend e worker entram na khal-wanet p/ alcançar a Omni API do sandbox
  # (resolver LID→telefone no find_customer + envio proativo SPEC-009). Mantêm a `default`
  # (appnet) p/ o resto do negócio. Não dá acesso novo do AGENTE ao negócio — o agente
  # segue restrito por tool-scoping; é só a rota de SAÍDA backend/worker → Omni.
  backend:
    networks:
      default: {}
      khal-wanet: {}

  notifications-worker:
    networks:
      default: {}
      khal-wanet: {}

volumes:
  claude-home:
  # R-05: estado do postgres dedicado do Genie (sessões/bridge), nomeado e durável.
  genie-pgdata:
