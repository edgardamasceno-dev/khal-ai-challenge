# Frontmatter do agente Genie `luz-do-vale` (camada de tool-scoping sobre a
# persona da entrega em implementation/agent/AGENTS.md).
#
# O genie-wire.sh prepende este bloco (entre `---`) ao corpo da persona e grava
# em agents/luz-do-vale/AGENTS.md. O agent-sync do Genie lê estes campos e os
# materializa no DirectoryEntry; o omni-bridge, ao spawnar o Claude Code, emite:
#   - permissions.allow/deny  -> --settings { permissions }
#   - disallowedTools         -> --disallowedTools <tool> (bloqueio forte)
#   - systemPromptFile        -> --append-system-prompt-file AGENTS.md (persona)
#
# Camada 1 dos guardrails (doc 09): o agente SÓ alcança o negócio via MCP
# `mcp__luz-do-vale__*`. Sem WebFetch/WebSearch/Bash/escrita -> não navega, não
# exfiltra, não age fora do atendimento, mesmo com o canal Anthropic aberto.
name: luz-do-vale
description: Atendente de CX da Luz do Vale no WhatsApp; usa apenas as ferramentas MCP da distribuidora.
provider: claude
promptMode: append
# ATENÇÃO: este bloco `permissions.allow` é DERIVADO da fonte única
# `src/interfaces/mcp/allowlist.py` (permissions_allow()). NÃO edite à mão sem
# atualizar a allowlist: o teste tests/unit/test_tool_scope_parity.py FALHA o CI
# se houver divergência (mesmas tools, mesma ORDEM canônica de registro do
# server.py + Bash(omni:*) ao final). Ordem estável = pré-requisito do prompt
# caching (R-07). Tools na ordem de registro do server.py.
permissions:
  allow:
    - mcp__luz-do-vale__find_customer_by_phone
    - mcp__luz-do-vale__list_contracts
    - mcp__luz-do-vale__get_invoice_status
    - mcp__luz-do-vale__generate_invoice_pdf
    - mcp__luz-do-vale__get_outage_by_region
    - mcp__luz-do-vale__create_ticket
    - mcp__luz-do-vale__get_ticket_status
    - mcp__luz-do-vale__request_human_handoff
    - mcp__luz-do-vale__search_knowledge_base
    - mcp__luz-do-vale__get_account_events
    - mcp__luz-do-vale__get_chat_history
    - mcp__luz-do-vale__get_consumption_insights
    # Bash ESCOPADO só aos verbos de resposta do Omni (omni say/done/react).
    # O Genie responde o WhatsApp via `omni ...`; sem isto, o agente não responde.
    # Bash arbitrário NÃO é auto-aprovado (permission-mode auto) e a rede só-MCP
    # + egress allowlist impedem qualquer alcance ao negócio/internet por outra via.
    - Bash(omni:*)
  deny:
    - WebFetch
    - WebSearch
    - Edit
    - Write
    - NotebookEdit
    - Task
# Bloqueio DURO (não contornável) de exfiltração/escrita/subagentes.
# Bash fica de fora aqui de propósito: é escopado a `omni:*` no allow acima.
disallowedTools:
  - WebFetch
  - WebSearch
  - Edit
  - Write
  - NotebookEdit
  - Task
  - KillShell
# O agente só envia texto; o PDF da fatura sai pela tool (ADR-0003), não pelo reply.
omniScopes:
  - say
